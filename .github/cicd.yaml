name: CI/CD Pipeline

on:
  push:
    branches:
      - dev  # Run SonarQube on the dev branch
      - test
  pull_request:
    branches:
      - dev
      - test

jobs:
  lint-test:
    name: Lint & Test Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Flake8
        run: flake8 . --max-line-length=100

      - name: Run Unit Tests
        run: pytest tests/

  sonar-analysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Sonar Scanner
        run: |
          wget -qO- https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip | bsdtar -xf- -C /opt
          echo "/opt/sonar-scanner-5.0.1.3006-linux/bin" >> $GITHUB_PATH

      - name: Run SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=ml-app \
            -Dsonar.sources=. \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.python.version=3.11 \
            -Dsonar.exclusions=**/tests/**, **/__pycache__/**

  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: sonar-analysis

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ml-app:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ml-app:latest

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: SSH into VM and Deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/ml-app:latest
            docker stop ml-app || true
            docker rm ml-app || true
            docker run -d -p 5000:5000 --name ml-app ${{ secrets.DOCKER_USERNAME }}/ml-app:latest