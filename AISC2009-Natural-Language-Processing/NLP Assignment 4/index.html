
<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
</head>
<body>
    <h1>Chat with the Bot</h1>
    <form method="POST">
        <input type="text" name="user_input" placeholder="Say something..." required>
        <button type="submit">Send</button>
    </form>
    {% if response %}
    <h3>Bot:</h3>
    <p>{{ response }}</p>
    {% endif %}
</body>
</html>
